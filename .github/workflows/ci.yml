name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Actions use major-version tags, kept current by Dependabot
      # (.github/dependabot.yml). SHA-pinning intentionally not used.
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install (dev deps + editable project)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e . --no-deps

      # Single source of truth for lint/format/type/hygiene: pre-commit owns the
      # pinned ruff + the strict-mypy (system) hook + the file-hygiene hooks, so
      # local and CI cannot drift.
      - name: Lint, format, type-check, hygiene (pre-commit)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Tests
        run: pytest -q --cov
