# Default trader configuration — a complete, runnable, SAFE starting point.
#
# Precedence (lowest to highest): model defaults < this file < environment < CLI.
# Override any leaf via env, e.g.  TRADER__RISK__MAX_TRADES_PER_DAY=8
# Secrets are NEVER stored here — only references (see `account.secrets_ref`).

mode: paper                       # paper | live | backtest  (live requires an explicit confirm later)

account:
  broker: schwab
  account_ref: primary            # which linked account to trade
  secrets_ref: keychain           # where credentials are read from (§13); never inline

schedule:                         # global scheduling defaults, inherited by every strategy
  timezone: America/New_York
  market_calendar: XNYS
  base_seed: null                 # int => reproducible drift (backtest); null => entropy (live)
  catch_up: false                 # skip a missed slot rather than fire it late
  misfire_grace_seconds: 120

strategies:                       # at least one is required
  - id: momentum
    name: threshold               # resolved via the StrategyRegistry (M3)
    enabled: true
    params: { band: 0.02, lot: 10 }
    universe: [AAPL, MSFT]
    slots:
      - { id: morning, time: "09:45", drift_max_minutes: 30, drift_direction: forward, distribution: uniform, on_overshoot: clamp }
      - { id: midday,  time: "12:30", drift_max_minutes: 30, drift_direction: forward, distribution: uniform, on_overshoot: clamp }
      - { id: close,   time: "15:30", drift_max_minutes: 30, drift_direction: forward, distribution: uniform, on_overshoot: clamp }
  - id: meanrev
    name: zscore_revert           # mean-reversion on the trailing z-score (M6.4)
    enabled: true
    params: { lookback: 20, z_entry: 2.0, z_exit: 0.5, lot: 10 }
    universe: [SPY, QQQ]          # distinct universe -> clean per-strategy attribution
    slots:
      - { id: midday, time: "12:00", drift_max_minutes: 30, drift_direction: forward, distribution: uniform, on_overshoot: clamp }

risk:                             # account-wide limits (per-strategy risk_overrides may tighten these)
  max_position_size_pct: 10
  max_order_notional_usd: 5000
  max_gross_exposure_usd: 25000
  daily_loss_limit_pct: 2
  max_trades_per_day: 6
  max_staleness_seconds: 60
  max_spread_pct: 1.0
  allowlist: [AAPL, MSFT, SPY, QQQ]  # default-deny: only these symbols may trade
  enforce_pdt: true
  auto_flatten_on_kill: false
  conflict_policy: net            # net | independent | priority

execution:
  order_type: market              # market | limit
  poll_timeout_seconds: 60
  rate_limit_per_min: 100         # stay under the ~120/min ceiling

alerting:
  channels: [telegram, email]
  heartbeat_minutes: 60

observability:
  log_format: json
  db_path: /state/trader.sqlite   # container volume path (see deploy/)
  data_cache: /data/

